<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Student Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh; padding: 20px 0;">
        <div class="card shadow-lg p-4" style="width: 500px;">
            <h3 class="text-center mb-3">Create Account</h3>
            <h5 class="text-center text-primary mb-4">Sign Up</h5>
            
            {% if success %}
                <div class="alert alert-success">{{ success }}</div>
                <a href="{{ url_for('login') }}" class="btn btn-primary w-100">Go to Login</a>
            {% elif error %}
                <div class="alert alert-danger">{{ error }}</div>
            {% endif %}
            
            {% if not success %}
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" placeholder="Choose a username" value="{{ form_data.username }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" placeholder="Enter email" value="{{ form_data.email }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <div class="input-group">
                            <input type="password" id="signup_password" name="password" class="form-control" placeholder="Enter password (min 8, upper/lower/number/special)" required>
                            <button class="btn btn-outline-secondary" type="button" id="toggle_signup_password" aria-label="Show password">👁</button>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Retype Password</label>
                        <div class="input-group">
                            <input type="password" id="signup_confirm_password" name="confirm_password" class="form-control" placeholder="Retype password" required>
                            <button class="btn btn-outline-secondary" type="button" id="toggle_signup_confirm_password" aria-label="Show password">👁</button>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Role</label>
                        <select name="role" class="form-control" required>
                            <option value="">Select a role</option>
                            <option value="student" {% if form_data.role == 'student' %}selected{% endif %}>Student</option>
                            <option value="teacher" {% if form_data.role == 'teacher' %}selected{% endif %}>Teacher</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Security Question</label>
                        <select name="security_question" class="form-control" required>
                            <option value="">Select a security question</option>
                            {% for question in questions %}
                            <option value="{{ question }}" {% if form_data.security_question == question %}selected{% endif %}>{{ question }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Security Answer</label>
                        <input type="text" name="security_answer" class="form-control" placeholder="Answer to your security question" value="{{ form_data.security_answer }}" required>
                        <small class="text-muted">Keep this safe - you'll need it to reset your password</small>
                    </div>
                    
                    <button class="btn btn-primary w-100">Create Account</button>
                </form>
                
                <div class="text-center mt-3">
                    <p>Already have an account? <a href="{{ url_for('login') }}" class="text-decoration-none">Login here</a></p>
                </div>
            {% endif %}
        </div>
    </div>
    <script>
        function attachToggle(inputId, buttonId) {
            const input = document.getElementById(inputId);
            const button = document.getElementById(buttonId);
            if (!input || !button) return;
            button.addEventListener('click', function () {
                const isHidden = input.type === 'password';
                input.type = isHidden ? 'text' : 'password';
                button.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
            });
        }

        attachToggle('signup_password', 'toggle_signup_password');
        attachToggle('signup_confirm_password', 'toggle_signup_confirm_password');
    </script>
</body>
</html>
